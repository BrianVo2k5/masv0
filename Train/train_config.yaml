# train_config.yaml — edit this, train.py reads it at startup

model:
  model_id: "facebook/bart-large-cnn"
  torch_dtype: "fp32"          # fp32 | fp16 | bfloat16

dataset:
  name: "cnn_dailymail"
  version: "3.0.0"
  train_split: "train"
  val_split: "validation"
  max_input_len: 1024
  max_target_len: 128
  num_workers: 4

lora:
  r: 8
  lora_alpha: 16                   # usually 2×r
  lora_dropout: 0.05
  bias: "none"
  # which linear layers to target in BART encoder+decoder
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "out_proj"
    - "fc1"
    - "fc2"

training:
  output_dir: "./runs/bart-lora"
  num_train_epochs: 3
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 4   # effective batch = 32
  per_device_eval_batch_size: 16
  learning_rate: 5.0e-5            # Slower learning for safety in BART-large
  max_grad_norm: 1.0               # Prevent NaN
  lr_scheduler_type: "linear"
  warmup_steps: 500                # More timeup for BART-large to adjust to LoRA
  weight_decay: 0.01
  bf16: false
  fp16: false
  dataloader_pin_memory: false     # must be false on MPS
  eval_strategy: "epoch"
  logging_steps: 50
  seed: 42

checkpointing:
  save_steps: 500                  # save temp checkpoint every N steps
  keep_last_n_steps: 3             # how many step-checkpoints to keep
  save_at_epoch_end: true          # always keep full epoch checkpoints