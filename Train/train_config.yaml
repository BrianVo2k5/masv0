# train_config.yaml — edit this, training.py reads it at startup

model:
  model_id: "allenai/led-base-16384"  # LED is designed for long documents
  torch_dtype: "fp32"          # fp32 | fp16 | bfloat16

dataset:
  name: "cnn_dailymail"
  version: "3.0.0"             # Required subset version for CNN/DailyMail
  train_split: "train"
  val_split: "validation"
  text_column: "article"       # CNN/DailyMail uses 'article'
  summary_column: "highlights" # CNN/DailyMail uses 'highlights'
  max_input_len: 1024          # (Change to 16384 here if you are using LED!)
  max_target_len: 128          # Raised back up for multi-sentence bullet points
  num_workers: 4

lora:
  r: 8
  lora_alpha: 16                   # usually 2×r
  lora_dropout: 0.05
  bias: "none"
  # which linear layers to target in BART encoder+decoder
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "out_proj"
    - "fc1"
    - "fc2"

training:
  output_dir: "./runs/bart-lora"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8   # effective batch = 32
  per_device_eval_batch_size: 16
  learning_rate: 2.0e-5            # Slower than 5.0e-5 which failed at step 950...
  max_grad_norm: 1.0               # Prevent NaN
  lr_scheduler_type: "linear"
  warmup_steps: 800                # More time for BART-large to adjust to LoRA
  weight_decay: 0.01
  bf16: false
  fp16: false
  dataloader_pin_memory: false     # must be false on MPS
  eval_strategy: "epoch"
  logging_steps: 50
  seed: 42

checkpointing:
  save_steps: 200                  # save temp checkpoint every N steps
  keep_last_n_steps: 3             # how many step-checkpoints to keep
  save_at_epoch_end: true          # always keep full epoch checkpoints